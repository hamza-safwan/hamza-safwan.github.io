<!DOCTYPE html>
<html>

<head>
<title>Hamza Safwan</title>
<link rel = "shortcut icon" type="x-1 icon" href = "user.svg">
    <style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@100&display=swap');
        body {
            background-color: white;
            font-family: 'Poppins', sans-serif;
			margin-left: 100px;
			margin-top: 100px;
        }

        h1 {
            font-size: 50px;
        }

        h2 {
            font-size: 30px;
        }

        p {
            font-size: 20px;
        }

        .blue-bubble {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 120px;
            height: 120px;
            background-color: #ADD8E6;
            border-radius: 50%;
        }

        .grey-bubble {
            position: absolute;
            bottom: 90px;
            right: 120px;
            width: 100px;
            height: 100px;
            background-color: #D3D3D3;
            border-radius: 50%;
            animation: swim 5s infinite;
        }

        .green-bubble {
            position: absolute;
            bottom: 20px;
            right: 220px;
            width: 100px;
            height: 100px;
            background-color: #90EE90;
            border-radius: 50%;
        }
		.salmon-bubble {
            position: absolute;
            bottom: 200px;
            right: 20px;
            width: 100px;
            height: 100px;
            background-color: #FFA07A;
            border-radius: 50%;
        }
		.coral-bubble {
            position: absolute;
            bottom: 350px;
            right: 20px;
            width: 80px;
            height: 80px;
            background-color: #F08080;
            border-radius: 50%;
        }
		.yellow-bubble {
            position: absolute;
            bottom: 30px;
            right: 400px;
            width: 180px;
            height: 180px;
            background-color: #FFFF00;
            border-radius: 50%;
        }
		.black-bubble {
            position: absolute;
            bottom: 170px;
            right: 270px;
            width: 150px;
            height: 150px;
            background-color: #454545;
            border-radius: 50%;
        }
        
        @keyframes swim {
            0% {
                transform: translate(0, 0);
            }

            100% {
                transform: translate(0, -100vh);
            }
        }
    </style>
</head>

<body>
    <h1>Hamza Safwan</h1>
    <h2>Data Scientist & ML/DL Engineer</h2>
    <p id="editable-text">Thanks for checking-in. Site is in development. Will be available<br> soon. Meanwhile Connect & Message me on LinkedIn.</p>
    <div class="blue-bubble"></div>
    <br>
    <div class="grey-bubble"></div>
    <br>
    <div class="green-bubble"></div>
	<br>
    <div class="salmon-bubble"></div>
	<br>
    <div class="coral-bubble"></div>
	<br>
    <div class="yellow-bubble"></div>
	<br>
    <div class="black-bubble"></div>
</body>

</html>
